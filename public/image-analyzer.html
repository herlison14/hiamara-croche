<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisador de Imagens de Produtos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { margin-bottom: 30px; color: #333; }
        .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .image-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        .image-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
        .image-wrapper {
            width: 100%;
            height: 200px;
            background: #f9f9f9;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .image-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .image-info {
            padding: 15px;
        }
        .current-name {
            font-weight: bold;
            color: #333;
            font-size: 13px;
            word-break: break-word;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ddd;
        }
        .category-select {
            width: 100%;
            padding: 8px;
            border: 2px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        .category-select:focus { border-color: #333; outline: none; }
        .description-input {
            width: 100%;
            padding: 8px;
            border: 2px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 8px;
            font-family: Arial, sans-serif;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
        }
        .btn-correct { background: #4CAF50; color: white; }
        .btn-correct:hover { background: #45a049; }
        .btn-skip { background: #2196F3; color: white; }
        .btn-skip:hover { background: #0b7dda; }
        .header {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 4px;
            text-align: center;
        }
        .stat-value { font-size: 24px; font-weight: bold; color: #333; }
        .stat-label { font-size: 12px; color: #666; margin-top: 5px; }
        .warning { background: #fff3cd; padding: 15px; border-radius: 4px; margin-bottom: 20px; border-left: 4px solid #ffc107; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Analisador de Imagens de Produtos - HIAMARA CROCHÊ</h1>
            <div class="warning">
                ⚠️ Analise cada imagem e corrija a categoria se necessário. Use as setas de navegação ou clique direto nas imagens.
            </div>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="total">0</div>
                    <div class="stat-label">Total de Imagens</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="reviewed">0</div>
                    <div class="stat-label">Analisadas</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="corrected">0</div>
                    <div class="stat-label">Corrigidas</div>
                </div>
            </div>
        </div>

        <div class="image-grid" id="imageGrid"></div>
    </div>

    <script>
        const CATEGORIES = [
            { value: 'blusa', label: 'Blusa' },
            { value: 'bolsa', label: 'Bolsa' },
            { value: 'amigurumi', label: 'Amigurumi' },
            { value: 'acessorio', label: 'Acessório' },
            { value: 'cozinha', label: 'Cozinha' },
            { value: 'decoracao', label: 'Decoração' }
        ];

        const images = [
            // Acessórios
            'acessorio-decorativo_127_pro.png', 'acessorio-decorativo_128_pro.png', 'acessorio-decorativo_129_pro.png',
            'acessorio-decorativo_130_pro.png', 'acessorio_banheiro-cozinha_1_pro.png', 'acessorio_banheiro-cozinha_2_pro.png',
            // Amigurumi
            'amigurumi_anime-diversos_1_pro.png', 'amigurumi_anime-personagens_1_pro.png', 'amigurumi_naruto-ninja_1_pro.png',
            'amigurumi_personagens-variados_1_pro.png',
            // Blusas
            'blusa_amarela-summer_1_pro.png', 'blusa_premium-designs_1_pro.png', 'blusa_rosa-pastel_1_pro.png',
            'blusa_turquesa-rendada_1_pro.png',
            // Bolsas
            'bolsa_flores-brancas_1_pro.png', 'bolsa_multicolor_1_pro.png', 'bolsa_premium-cores_1_pro.png',
            'bolsa_sacola-grande_1_pro.png',
            // Cozinha
            'cozinha_jogo-floral_1_pro.png', 'cozinha_jogo-multicolor_1_pro.png', 'cozinha_jogo-verde-branco_1_pro.png',
            // Decoração
            'decoracao_boneco-rosa_1_pro.png', 'decoracao_home-decor_1_pro.png'
        ];

        let corrections = {};

        function getCurrentCategory(filename) {
            return filename.split('_')[0];
        }

        function renderImages() {
            const grid = document.getElementById('imageGrid');
            grid.innerHTML = '';

            images.forEach((img, idx) => {
                const currentCat = getCurrentCategory(img);
                const card = document.createElement('div');
                card.className = 'image-card';
                card.innerHTML = `
                    <div class="image-wrapper">
                        <img src="/produtos/${img}" alt="Produto" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23ddd%22 width=%22100%22 height=%22100%22/%3E%3C/svg%3E'">
                    </div>
                    <div class="image-info">
                        <div class="current-name">${img}</div>
                        <select class="category-select" onchange="updateCorrection('${img}', this.value)">
                            <option value="">Selecione categoria...</option>
                            ${CATEGORIES.map(c => `<option value="${c.value}" ${currentCat === c.value ? 'selected' : ''}>${c.label}</option>`).join('')}
                        </select>
                        <input type="text" class="description-input" placeholder="Descrição (cores, detalhes...)" id="desc-${idx}">
                        <div class="action-buttons">
                            <button class="btn-correct" onclick="confirmCorrection('${img}', ${idx})">✓ Confirmar</button>
                            <button class="btn-skip" onclick="skipImage('${img}')">⊘ Pular</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });

            updateStats();
        }

        function updateCorrection(filename, category) {
            if (!corrections[filename]) corrections[filename] = {};
            corrections[filename].category = category;
        }

        function confirmCorrection(filename, idx) {
            const cat = document.querySelector(`select[onchange*="${filename}"]`).value;
            const desc = document.getElementById(`desc-${idx}`).value;

            if (!cat) {
                alert('Selecione uma categoria!');
                return;
            }

            if (!corrections[filename]) corrections[filename] = {};
            corrections[filename].category = cat;
            corrections[filename].description = desc;
            corrections[filename].confirmed = true;

            updateStats();
            alert(`Corrigido: ${filename}\n→ Categoria: ${cat}\n→ Descrição: ${desc}`);
        }

        function skipImage(filename) {
            if (!corrections[filename]) corrections[filename] = {};
            corrections[filename].skipped = true;
            updateStats();
        }

        function updateStats() {
            document.getElementById('total').textContent = images.length;
            document.getElementById('reviewed').textContent = Object.keys(corrections).filter(k => corrections[k].confirmed || corrections[k].skipped).length;
            document.getElementById('corrected').textContent = Object.keys(corrections).filter(k => corrections[k].confirmed && corrections[k].category !== getCurrentCategory(k)).length;
        }

        renderImages();
    </script>
</body>
</html>
